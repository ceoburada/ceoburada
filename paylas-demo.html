<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CEOBurada — Paylaşım Demosu</title>
<style>
  :root{
    --bg:#0b0e14; --bg2:#121722; --card:#161c28; --line:#232b3a;
    --tx:#e7ecf3; --tx2:#9aa7bd; --tx3:#6b7688;
    --acc:#3ea6ff; --ok:#28c76f; --live:#ff4d4f;
    --bloomberg-s:#e0902f; --cnbce-s:#5aa0da; --ekoturk-s:#e26467; --apara-s:#2fb69c;
    --radius:14px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--tx);
    font-family:"Segoe UI",system-ui,-apple-system,Roboto,Arial,sans-serif;-webkit-font-smoothing:antialiased}
  body{min-height:100vh;display:flex;flex-direction:column}
  a{color:inherit;text-decoration:none}
  header{background:rgba(11,14,20,.9);backdrop-filter:blur(10px);position:relative;z-index:10;border-bottom:1px solid var(--line)}
  .bar{max-width:1000px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .logo{display:flex;flex-direction:column;align-items:flex-start;gap:4px;font-weight:800;font-size:20px;letter-spacing:.3px}
  .name .dot{display:inline-block;width:.6em;height:.6em;border-radius:50%;background:var(--live);
    vertical-align:.05em;margin-right:.3em;box-shadow:0 0 0 0 rgba(255,77,79,.6);animation:pulse 1.8s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,77,79,.55)}70%{box-shadow:0 0 0 9px rgba(255,77,79,0)}100%{box-shadow:0 0 0 0 rgba(255,77,79,0)}}
  .logo small{color:var(--tx3);font-weight:600;font-size:12px;letter-spacing:.5px}
  .tumu{margin-left:auto;font-size:13px;color:var(--acc);border:1px solid var(--line);border-radius:999px;padding:6px 14px}
  main{flex:1;width:100%;max-width:1000px;margin:0 auto;padding:18px 20px 60px}

  .paylasim-not{display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid #2a3444;
    border-radius:12px;padding:11px 14px;color:var(--tx2);font-size:13px;margin-bottom:20px}
  .paylasim-not b{color:var(--tx)}
  .paylasim-not .ikon{color:var(--acc)}

  .prozet{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--acc);font-weight:700;margin:0 2px 8px}
  .paylasilan{margin-bottom:30px}
  .paylasilan .rp{border:1px solid var(--acc);box-shadow:0 0 0 3px rgba(62,166,255,.12)}

  .feedhead{display:flex;align-items:baseline;gap:10px;margin:28px 2px 12px}
  .feedhead h2{margin:0;font-size:18px;letter-spacing:.2px}
  .feedhead h2::before{content:"";display:inline-block;width:.55em;height:.55em;border-radius:50%;
    background:#e7ecf3;vertical-align:.08em;margin-right:.45em;
    box-shadow:0 0 0 0 rgba(231,236,243,.5);animation:pulseW 1.8s infinite}
  @keyframes pulseW{0%{box-shadow:0 0 0 0 rgba(231,236,243,.5)}70%{box-shadow:0 0 0 8px rgba(231,236,243,0)}100%{box-shadow:0 0 0 0 rgba(231,236,243,0)}}
  #feed,#dergiFeed{display:flex;flex-direction:column;gap:12px}

  .rp{background:var(--card);border:1px solid var(--line);border-left:3px solid var(--acc);
    border-radius:12px;overflow:hidden;user-select:none;-webkit-user-select:none}
  .rp.k-Bloomberg{border-left-color:var(--bloomberg-s)} .rp.k-Cnbce{border-left-color:var(--cnbce-s)}
  .rp.k-EkoTurk{border-left-color:var(--ekoturk-s)} .rp.k-Apara{border-left-color:var(--apara-s)}
  .rphead{display:flex;align-items:center;gap:9px;padding:12px 15px;flex-wrap:wrap}
  .rp .who{font-weight:800;font-size:14px}
  .rp .badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px;border:1px solid var(--line);color:var(--tx2)}
  .rp .badge.k-Bloomberg{color:var(--bloomberg-s);border-color:#3a2c1e}
  .rp .badge.k-Cnbce{color:var(--cnbce-s);border-color:#222f3c}
  .rp .badge.k-EkoTurk{color:var(--ekoturk-s);border-color:#382427}
  .rp .badge.k-Apara{color:var(--apara-s);border-color:#1f342e}
  .rp.rp-dergi{border-left-color:#a78bfa}
  .rp .badge.badge-dergi{color:#c4b5fd;border-color:#3a2f5a}
  .rp .time{color:var(--tx3);font-size:12px}
  .rp .meta{margin-left:auto;display:flex;align-items:center;gap:6px}
  .rp .cnt{color:var(--tx3);font-size:12px}
  .rp .chev{color:var(--tx2);font-size:16px;line-height:1;transition:.2s}
  .rp.open .chev{transform:rotate(180deg)}
  .rp.open .cnt{display:none}
  .rp:not(.solo){cursor:pointer}
  .rp:not(.solo):hover{background:#1b2433}
  .rp .manset{padding:0 15px 13px;color:var(--tx);font-size:15.5px;line-height:1.5}
  .rp .cumleler{display:none;flex-direction:column;gap:10px;padding:4px 15px 15px;border-top:1px solid var(--line)}
  .rp.open .manset{display:none}
  .rp.open .cumleler{display:flex}
  .rp .cm{font-size:15px;line-height:1.5;color:#c4cddb}
  .rp .cm .cmt{color:var(--tx3);font-size:11px;margin-right:8px;font-variant-numeric:tabular-nums}
  .rp .cm.mn{color:var(--tx);font-weight:700}

  /* Paylaş simgesi — balonun sağ altında */
  .rp{position:relative}
  .paybtn{position:absolute;right:12px;bottom:11px;display:inline-flex;align-items:center;gap:5px;
    color:var(--tx3);font-size:12px;border:1px solid var(--line);border-radius:999px;padding:4px 10px;
    background:var(--bg2);cursor:pointer;user-select:none}
  @media(hover:hover){ .paybtn:hover{color:var(--acc);border-color:var(--acc)} }
  .paybtn svg{width:13px;height:13px}
  .rp.open .cumleler{padding-bottom:40px}
  .rp:not(.solo) .manset{padding-bottom:40px}
  .solo .manset{padding-bottom:40px}

  .empty{color:var(--tx3);text-align:center;padding:40px;border:1px dashed var(--line);border-radius:12px}
  @media(max-width:600px){
    .rp .who{flex-basis:100%}
    .rp .meta{position:absolute;right:14px;top:12px;margin-left:0}
  }
</style>
</head>
<body>
<header>
  <div class="bar">
    <div class="logo"><span class="name"><span class="dot"></span>CEOBurada</span><small>BORSAYA KOTE ŞİRKETLERİN YÖNETİCİ DEMEÇLERİ</small></div>
    <a class="tumu" href="https://ceoburada.com/">Tüm demeçler →</a>
  </div>
</header>

<main>
  <div class="paylasim-not"><span class="ikon">🔗</span><span>Bu demeç sana <b>paylaşıldı</b> — CEOBurada'da yayınlandı. Tamamını aşağıda görüyorsun.</span></div>

  <div class="prozet">📌 Paylaşılan demeç</div>
  <div class="paylasilan" id="paylasilan"></div>

  <div class="feedhead"><h2>Son TV Demeçleri</h2></div>
  <div id="feed"></div>

  <div class="feedhead"><h2>Son Dergi Demeçleri</h2></div>
  <div id="dergiFeed"></div>
</main>

<script>
const SUPABASE_URL = "https://tnvslslbnwkyfxyfgwua.supabase.co";
const SUPABASE_KEY = "sb_publishable_DhYTkPGL8B48klEfO6caGw_b0SAn93l";
const AD = {Bloomberg:"Bloomberg HT", Cnbce:"Cnbce", EkoTurk:"EkoTürk", Apara:"Apara"};
const SEL = "grup,kod,etiket,kanal,gun,ilk_saat,manset,cumle_sayisi";
const DERGI_SEL = "grup,kod,etiket,dergi_ad,sayi,sayfa,manset,tarih,guncelleme";
// Demo: gerçekte ?r=<token> olurdu; burada token yerine grup kullanıyoruz
const PAYLASILAN = new URLSearchParams(location.search).get("r") || "RYSAS|Cnbce|2026-07-08";

const sb = (path) => fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
  headers:{ apikey:SUPABASE_KEY, Authorization:`Bearer ${SUPABASE_KEY}` }
}).then(r=>r.ok?r.json():[]);

function esc(s){ return (s||"").replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function tarih(g){ if(!g) return ""; try{ return new Date(g+"T00:00:00")
  .toLocaleDateString("tr-TR",{day:"2-digit",month:"short",year:"numeric"}); }catch(e){ return g; } }
function saatKisa(s){ return (s||"").replace(/^(\d{1,2}:\d{2}):\d{2}/, "$1"); }
const PAYICO = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.6" y1="13.5" x2="15.4" y2="17.5"/><line x1="15.4" y1="6.5" x2="8.6" y2="10.5"/></svg>`;

function cardHTML(r){
  const n = r.cumle_sayisi||1, solo = n<=1;
  const extra = solo ? "" :
    `<span class="meta"><span class="cnt">+${n-1} daha</span><span class="chev">▾</span></span>`;
  return `<div class="rp k-${esc(r.kanal)}${solo?" solo":""}" data-grup="${esc(r.grup)}" data-manset="${esc(r.manset||"")}">
    <div class="rphead">
      <span class="who">${esc(r.etiket||r.kod||"")}</span>
      <span class="badge k-${esc(r.kanal)}">${esc(AD[r.kanal]||r.kanal)}</span>
      <span class="time">${tarih(r.gun)}${r.ilk_saat?" · "+esc(saatKisa(r.ilk_saat)):""}</span>
      ${extra}
    </div>
    <div class="manset">${esc(r.manset||"")}</div>
    <div class="cumleler" data-loaded="0"></div>
    <span class="paybtn" data-grup="${esc(r.grup)}">${PAYICO} Paylaş</span>
  </div>`;
}
function dergiCardHTML(r){
  return `<div class="rp rp-dergi solo">
    <div class="rphead">
      <span class="who">${esc(r.etiket||r.kod||"")}</span>
      <span class="badge badge-dergi">${esc(r.dergi_ad||"Dergi")}</span>
      <span class="time">${esc(r.sayi||"")}${r.sayfa?" · "+esc(r.sayfa):""}</span>
    </div>
    <div class="manset">${esc(r.manset||"")}</div>
    <span class="paybtn" data-grup="${esc(r.grup)}">${PAYICO} Paylaş</span>
  </div>`;
}
async function loadCumleler(el){
  const box = el.querySelector(".cumleler");
  if(box.dataset.loaded==="1") return;
  const grup = el.dataset.grup, manset = el.dataset.manset;
  const rows = await sb(`demecler?grup=eq.${encodeURIComponent(grup)}&select=saat,chunk,cumle&order=chunk.asc,id.asc`);
  box.innerHTML = rows.map(x=>{
    const mn = (x.cumle===manset);
    return `<div class="cm${mn?" mn":""}"><span class="cmt">${esc(saatKisa(x.saat))}</span>${esc(x.cumle)}</div>`;
  }).join("");
  box.dataset.loaded="1";
}

// Paylaş: gerçekte Web Share API + metin; demoda örneği gösterelim
function paylas(grup){
  const link = `https://ceoburada.com/?r=${encodeURIComponent(grup)}`;
  const metin = `Bir yönetici demeci — CEOBurada'da:\n${link}`;
  if(navigator.share){ navigator.share({text:metin, url:link}).catch(()=>{}); }
  else { navigator.clipboard && navigator.clipboard.writeText(metin); alert("Paylaşım metni kopyalandı:\n\n"+metin); }
}
document.addEventListener("click", e=>{
  const pb = e.target.closest(".paybtn");
  if(pb){ e.stopPropagation(); paylas(pb.dataset.grup); return; }
  const el = e.target.closest("#feed .rp");
  if(el && !el.classList.contains("solo")){ if(String(getSelection())) return;
    if(el.classList.contains("open")) el.classList.remove("open");
    else { loadCumleler(el); el.classList.add("open"); } }
});

(async function(){
  // Paylaşılan röportaj — en üstte, akordiyon AÇIK
  const p = await sb(`roportaj?grup=eq.${encodeURIComponent(PAYLASILAN)}&select=${SEL}&limit=1`);
  const box = document.getElementById("paylasilan");
  if(p.length){
    box.innerHTML = cardHTML(p[0]);
    const rp = box.querySelector(".rp");
    await loadCumleler(rp);
    rp.classList.add("open");
  } else { box.innerHTML = `<div class="empty">Paylaşılan demeç bulunamadı.</div>`; }

  // Son TV Demeçleri
  const tv = await sb(`roportaj?select=${SEL}&order=guncelleme.desc&limit=6`);
  document.getElementById("feed").innerHTML = tv.length ? tv.map(cardHTML).join("")
    : `<div class="empty">Henüz demeç yok.</div>`;

  // Son Dergi Demeçleri
  const dg = await sb(`dergi?select=${DERGI_SEL}&order=guncelleme.desc&limit=5`);
  document.getElementById("dergiFeed").innerHTML = dg.length ? dg.map(dergiCardHTML).join("")
    : `<div class="empty">Henüz dergi demeci yok.</div>`;
})();
</script>
</body>
</html>
